<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل - متجرنا</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      color: #1e293b;
      font-size: 28px;
      margin-bottom: 12px;
    }
    
    p {
      color: #64748b;
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn:hover {
      background: #059669;
      transform: translateY(-2px);
    }
    
    .status {
      margin-top: 30px;
      padding: 12px 20px;
      background: #fef3c7;
      border-radius: 8px;
      color: #92400e;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .pulse {
      width: 10px;
      height: 10px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      لا يمكن الوصول إلى المتجر حالياً. 
      تأكد من اتصالك بالإنترنت وحاول مرة أخرى.
    </p>
    <button class="btn" onclick="location.reload()">
      إعادة المحاولة
    </button>
    <div class="status">
      <span class="pulse"></span>
      <span>في انتظار الاتصال...</span>
    </div>
  </div>
  
  <script>
    // مراقبة حالة الاتصال
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
